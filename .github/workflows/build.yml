name: Build Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.CyanFin/Jellyfin.Plugin.CyanFin.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package DLL
        run: |
          mkdir -p dist
          cp Jellyfin.Plugin.CyanFin/bin/Release/net8.0/Jellyfin.Plugin.CyanFin.dll dist/
          cd dist && zip -r CyanFin-Plugin-${{ steps.version.outputs.version }}.zip Jellyfin.Plugin.CyanFin.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyanFin-Plugin-${{ steps.version.outputs.version }}
          path: dist/*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
